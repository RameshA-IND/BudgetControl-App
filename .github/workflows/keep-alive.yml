name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 14 minutes to prevent the Render free tier from sleeping (which happens after 15 mins)
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: curl -s -o /dev/null -w "%{http_code}" https://budget-control-api.onrender.com/swagger/index.html
